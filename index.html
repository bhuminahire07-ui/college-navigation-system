<!DOCTYPE html>
<html>
<head>
<title>KKWIEER Navigation System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#eef2f3; text-align:center; margin:0; }
h2 { background:#2c3e50; color:white; padding:15px; margin:0; }
.container { padding:20px; }

.btn {
    display:block;
    width:90%;
    max-width:350px;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
    color:white;
    font-weight:bold;
}

.back { background:#e67e22 !important; }

.output {
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

.flowchart {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    margin-top:15px;
}

.step {
    background:#fff;
    border:2px solid #2c3e50;
    padding:10px;
    margin:5px;
    border-radius:8px;
}

.arrow { font-size:20px; margin:5px; }

.final-step { background:#2ecc71; color:white; }
</style>
</head>

<body>

<h3>Choose Language / भाषा निवडा</h3>
<button class="btn back" onclick="setLanguage('en')">English</button>
<button class="btn back" onclick="setLanguage('mr')">मराठी</button>
</div>

<div class="output" id="output"></div>

function translate(text){
if(selectedLanguage==="en") return text;
Object.keys(marathi).sort((a,b)=>b.length-a.length)
.forEach(k=>text=text.replaceAll(k,marathi[k]));
return text;
}

// ===== FLOW =====
function showFlow(text){
let t=translate(text);
output.innerHTML="📍 "+t;

let steps=t.split("→");
let f="<div class='flowchart'>";
steps.forEach((s,i)=>{
f+=`<div class='step ${i==steps.length-1?"final-step":""}'>${s}</div>`;
if(i<steps.length-1)f+=`<div class='arrow'>➡️</div>`;
});
f+="</div>";
output.innerHTML+=f;
}

// ===== NAVIGATION =====
function setLanguage(lang){
selectedLanguage=lang;
languageSelection.style.display="none";
app.style.display="block";
showCampus();
}

function goToLanguage(){
app.style.display="none";
languageSelection.style.display="block";
output.innerHTML="";
}

function showCampus(){
let html="<h3>"+translate("Select Location")+"</h3>";
for(let p in campus){
html+=`<button class='btn back' onclick='showCampusDirection("${p}")'>${translate(p)}</button>`;
}
html+=`<button class='btn back' onclick='goToLanguage()'>⬅ Back</button>`;
app.innerHTML=html;
}

function showCampusDirection(p){
currentText=campus[p];
showFlow(currentText);

if(p==="Engineering Building"){
app.innerHTML=`
<button class='btn' style='background:#2c3e50' onclick='showDepartments()'>
${translate("Enter Building")}
</button>
<button class='btn back' onclick='showCampus()'>⬅ Back</button>
`;
} else {
app.innerHTML=`<button class='btn back' onclick='showCampus()'>⬅ Back</button>`;
}
}

function showDepartments(){
let html="<h3>"+translate("Select Department")+"</h3>";
for(let d in data){
html+=`<button class='btn' style='background:${colors[d]}' onclick='showLocations("${d}")'>${translate(d)}</button>`;
}
html+=`<button class='btn back' onclick='showCampus()'>⬅ Back</button>`;
app.innerHTML=html;
}

function showLocations(d){
currentDept=d;
let html="";
for(let l in data[d]){
html+=`<button class='btn' style='background:${colors[d]}' onclick='showDirection("${l}")'>${translate(l)}</button>`;
}
html+=`<button class='btn back' onclick='showDepartments()'>⬅ Back</button>`;
app.innerHTML=html;
}

function showDirection(l){
currentText=data[currentDept][l];
showFlow(currentText);

app.innerHTML=`
<button class='btn back' onclick='showLocations(currentDept)'>${translate("Other Location")}</button>
<button class='btn back' onclick='showDepartments()'>${translate("Change Department")}</button>
<button class='btn back' onclick='goToEntrance()'>${translate("Go to Main Entrance")}</button>
`;
}

// ===== RETURN =====
function goToEntrance(){
let path = currentText.split("→").map(s => s.trim());
path.pop();
path = path.reverse();

path = path.map(step => {
if(step==="left") return "right";
if(step==="right") return "left";
if(step.includes("floor")) return "stairs → ground floor";
return step;
});

path.push("Main entrance");
showFlow(path.join(" → "));
}

</script>

</html>
